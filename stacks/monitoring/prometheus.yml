global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['${PI_IP}:9100']
        # Replace ${PI_IP} with your Raspberry Pi's IP address, e.g. 192.168.1.100
        # Or use 'localhost:9100' if Prometheus runs on the same host as node-exporter
