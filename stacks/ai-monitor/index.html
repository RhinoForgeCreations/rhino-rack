<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RHINO RACK Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1600px; height: 600px; overflow: hidden;
  background: #060c18;
  color: #e2e8f0;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ═══ LAYOUT ═══ */
#app { display: grid; grid-template-columns: 380px 840px 380px; height: 600px; }
.panel {
  height: 600px; overflow: hidden;
  padding: 13px 14px;
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.07);
}
.panel:last-child { border-right: none; }

/* ═══ LEFT ═══ */
.host-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-shrink: 0; }
.host-dot { width: 11px; height: 11px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.host-name { font-size: 22px; font-weight: 900; color: #f1f5f9; letter-spacing:.02em; }
.host-ts { margin-left: auto; font-size: 11px; color: rgba(255,255,255,.4); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); padding: 2px 9px; border-radius: 99px; }

/* Gauges */
.gauges-row { display: flex; gap: 2px; flex-shrink: 0; margin-bottom: 7px; }
.gauge-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; }
.gauge-svg { width: 114px; height: 114px; overflow: visible; }
.g-track { fill: none; stroke: #0d1f38; stroke-width: 11; }
.g-fill { fill: none; stroke-width: 11; stroke-linecap: round; transition: stroke-dasharray .7s ease, stroke .4s ease; transform: rotate(-90deg); transform-origin: 57px 57px; }
.g-val { font-size: 24px; font-weight: 900; fill: #f1f5f9; text-anchor: middle; dominant-baseline: middle; }
.g-lbl { font-size: 10px; font-weight: 700; fill: rgba(255,255,255,.35); text-anchor: middle; letter-spacing:.12em; text-transform: uppercase; }

/* Divider / section title */
.hr { height: 1px; background: rgba(255,255,255,.08); margin: 5px 0; flex-shrink: 0; }
.sec-title { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 5px; flex-shrink: 0; }

/* Storage */
.stor-list { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.stor-item { display: flex; flex-direction: column; gap: 2px; }
.stor-top { display: flex; align-items: baseline; gap: 7px; }
.stor-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: .55; }
.stor-icon path, .stor-icon rect, .stor-icon circle { fill: currentColor; }
.stor-name { font-size: 15px; font-weight: 800; color: #f1f5f9; }
.stor-size { font-size: 12px; color: rgba(255,255,255,.45); margin-left: auto; }
.stor-bottom { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.35); }
.stor-pct { font-weight: 700; color: #94a3b8; font-size: 12px; }
.stor-bar { height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.stor-fill { height: 100%; border-radius: 4px; transition: width .7s ease; }
.cb { background: #3b82f6; } .cg { background: #22c55e; } .cp { background: #a855f7; }
.cc { background: #06b6d4; } .co { background: #f59e0b; } .cr { background: #ef4444; } .cy { background: #eab308; }
.stor-unmounted { color: #f59e0b; }
.stor-slot { display: flex; align-items: center; gap: 8px; height: 32px; padding: 0 6px; border: 1px dashed rgba(255,255,255,.1); border-radius: 6px; color: rgba(255,255,255,.18); font-size: 12px; }

/* Network */
.net-row { display: flex; gap: 8px; margin-top: 5px; flex-shrink: 0; }
.net-card { flex: 1; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09); border-radius: 9px; padding: 6px 10px; }
.net-dir { font-size: 10px; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing:.1em; }
.net-val { font-size: 22px; font-weight: 900; color: #f1f5f9; line-height: 1.15; }
.net-unit { font-size: 11px; color: rgba(255,255,255,.4); }
.uptime-row { font-size: 12px; color: rgba(255,255,255,.3); margin-top: 5px; flex-shrink: 0; }
.uptime-row span { color: rgba(255,255,255,.6); font-weight: 600; }

/* ═══ CENTRE ═══ */
#centre { padding: 13px 16px; }
.centre-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; flex-shrink: 0; }
.d-label { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform: uppercase; color: rgba(255,255,255,.3); }
.d-count { font-size: 16px; font-weight: 700; color: #94a3b8; margin-top: 2px; }
.clock-block { text-align: right; }
.clock { font-size: 50px; font-weight: 900; color: #f1f5f9; line-height: 1; letter-spacing:.03em; font-variant-numeric: tabular-nums; }
.clock-date { font-size: 13px; color: rgba(255,255,255,.4); margin-top: 2px; }

/* Docker grid — 4 cols, fills remaining height */
.docker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; flex: 1; min-height: 0; }

/* Tile */
.tile { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09); border-radius: 13px; padding: 14px 14px 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; overflow: hidden; position: relative; }
.tile::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 13px 0 0 13px; }
.tile.healthy::before  { background: #22c55e; }
.tile.unhealthy::before { background: #ef4444; }
.tile.starting::before  { background: #f59e0b; }
.tile.exited::before    { background: rgba(255,255,255,.2); }

/* Logo — dominant visual element */
.tile-logo { width: 44px; height: 44px; fill: rgba(255,255,255,.9); flex-shrink: 0; }
.tile.unhealthy .tile-logo { fill: rgba(239,68,68,.85); }
.tile.exited    .tile-logo { fill: rgba(255,255,255,.3); }

.tile-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.55); text-align: center; line-height: 1.1; }
.tile-bottom { display: flex; align-items: center; gap: 6px; }
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sdot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
.sdot.red    { background: #ef4444; }
.sdot.yellow { background: #f59e0b; }
.sdot.gray   { background: rgba(255,255,255,.2); }
.tile-status { font-size: 11px; color: rgba(255,255,255,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ═══ RIGHT: RACK AI JARVIS HUD ═══ */
#right { padding: 10px 10px; display: flex; flex-direction: column; align-items: center; }

/* HUD wrapper */
.hud-wrap { position: relative; width: 280px; height: 280px; flex-shrink: 0; margin: 0 auto; will-change: transform; transform: translateZ(0); }
.hud-svg { width: 280px; height: 280px; overflow: visible; }

/* Ring animations */
@keyframes hud-spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes hud-rspin { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
@keyframes hud-scan  { from{transform:rotate(-90deg)} to{transform:rotate(270deg)} }
@keyframes hud-blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes hud-glow  { 0%,100%{opacity:.7} 50%{opacity:1} }

.hud-ring1 { transform-origin: 140px 140px; animation: hud-spin 20s linear infinite; will-change: transform; }
.hud-ring2 { transform-origin: 140px 140px; animation: hud-rspin 14s linear infinite; will-change: transform; }
.hud-ring3 { transform-origin: 140px 140px; animation: hud-spin 9s linear infinite; will-change: transform; }
.hud-scan-arm { transform-origin: 140px 140px; animation: hud-scan 6s linear infinite; will-change: transform; }

/* Speed up when active */
.hud-active .hud-ring1 { animation-duration: 5s; }
.hud-active .hud-ring2 { animation-duration: 3.5s; }
.hud-active .hud-ring3 { animation-duration: 2s; }
.hud-active .hud-scan-arm { animation-duration: 1.5s; }

/* Corner bracket overlays */
.hud-br-tl,.hud-br-tr,.hud-br-bl,.hud-br-br {
  position: absolute; width: 16px; height: 16px;
  border-color: rgba(56,189,248,.6); border-style: solid;
  animation: hud-blink 2.5s ease-in-out infinite;
}
.hud-br-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
.hud-br-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; animation-delay: .6s; }
.hud-br-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; animation-delay: 1.2s; }
.hud-br-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; animation-delay: 1.8s; }

/* Center text overlay */
.hud-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none;
}
.hud-brand {
  font-size: 20px; font-weight: 900; letter-spacing: .2em;
  color: #38bdf8; text-shadow: 0 0 14px rgba(56,189,248,.9);
  animation: hud-glow 2.5s ease-in-out infinite;
}
.hud-sub { font-size: 8px; letter-spacing: .22em; color: rgba(56,189,248,.45); text-transform: uppercase; margin-top: 2px; }
.hud-stat { font-size: 11px; color: rgba(56,189,248,.7); margin-top: 8px; font-variant-numeric: tabular-nums; letter-spacing: .04em; }
.hud-stat b { color: #38bdf8; }

/* Status label */
.rack-status {
  font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
  color: rgba(56,189,248,.4); text-align: center; margin-top: 5px; flex-shrink: 0;
}
.rack-status.working { color: #38bdf8; animation: hud-blink .55s ease-in-out infinite; }

/* RACK AI messages */
.msgs-wrap { flex: 1; width: 100%; overflow: hidden; display: flex; flex-direction: column; gap: 5px; padding-top: 8px; min-height: 0; }
.rack-msg {
  background: rgba(56,189,248,.04);
  border: 1px solid rgba(56,189,248,.1);
  border-left: 2px solid rgba(56,189,248,.3);
  border-radius: 0 6px 6px 0;
  padding: 5px 10px; flex-shrink: 0;
}
.rack-msg.active {
  background: rgba(56,189,248,.09);
  border-color: rgba(56,189,248,.25);
  border-left-color: #38bdf8;
}
.rack-msg-who { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: rgba(56,189,248,.45); text-transform: uppercase; margin-bottom: 2px; }
.rack-msg.active .rack-msg-who { color: #38bdf8; }
.rack-msg-text { font-size: 12px; color: rgba(255,255,255,.7); line-height: 1.35; }
.rack-msg.active .rack-msg-text { color: #e2e8f0; }

/* === RACKMODULE1 section === */
.m1-host-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-shrink: 0; }
.m1-dot { width: 9px; height: 9px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
.m1-dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s ease-in-out infinite; }
.m1-dot.offline { background: #ef4444; }
.m1-name { font-size: 18px; font-weight: 900; color: #f1f5f9; letter-spacing: .02em; }
.m1-sub { margin-left: auto; font-size: 11px; color: rgba(255,255,255,.4); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); padding: 2px 9px; border-radius: 99px; }
.m1-gauges-row { display: flex; gap: 2px; flex-shrink: 0; margin-bottom: 5px; }
.m1-gauge-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; }
.m1g-svg { width: 84px; height: 84px; overflow: visible; }
.m1g-track { fill: none; stroke: #0d1f38; stroke-width: 9; }
.m1g-fill { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dasharray .7s ease, stroke .4s ease; transform: rotate(-90deg); transform-origin: 42px 42px; }
.m1g-val { font-size: 18px; font-weight: 900; fill: #f1f5f9; text-anchor: middle; dominant-baseline: middle; }
.m1g-lbl { font-size: 9px; font-weight: 700; fill: rgba(255,255,255,.35); text-anchor: middle; letter-spacing:.12em; text-transform: uppercase; }
.m1-disk-row { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.m1-disk-top { display: flex; align-items: baseline; gap: 6px; }
.m1-disk-name { font-size: 12px; font-weight: 800; color: #f1f5f9; }
.m1-disk-size { font-size: 11px; color: rgba(255,255,255,.4); margin-left: auto; }
.m1-disk-pct { font-weight: 700; color: #94a3b8; font-size: 11px; }
.m1-disk-bar { height: 6px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.m1-disk-fill { height: 100%; border-radius: 4px; transition: width .7s ease; background: #a855f7; }
</style>
</head>

<script>
// ═══ Gauge: r=46, circ=289.03 ═══
const CIRC = 2 * Math.PI * 46;
function setGauge(id, pct, color) {
  const fill = Math.min(Math.max(pct,0),100) / 100 * CIRC;
  const el = document.getElementById('gf-' + id);
  el.setAttribute('stroke-dasharray', fill.toFixed(2) + ' ' + CIRC.toFixed(2));
  el.setAttribute('stroke', color);
}

// ═══ Network ═══
let prevRx=null, prevTx=null, prevT=null;
function fmtSpeed(bps) {
  if (bps >= 1048576) return { v:(bps/1048576).toFixed(2), u:'MB/s' };
  if (bps >= 1024)    return { v:(bps/1024).toFixed(1),    u:'KB/s' };
  return { v:bps.toFixed(0), u:'B/s' };
}

// ═══ Container registry with logo IDs ═══
const CMAP = {
  // service families — key is prefix or exact match
  'jellyfin':              { logo:'L-jellyfin',     name:'Jellyfin' },
  'grafana':               { logo:'L-grafana',      name:'Grafana' },
  'n8n':                   { logo:'L-n8n',          name:'n8n' },
  'portainer':             { logo:'L-portainer',    name:'Portainer' },
  'portainer_ce':          { logo:'L-portainer',    name:'Portainer' },
  'pihole':                { logo:'L-pihole',       name:'Pi-hole' },
  'homeassistant':         { logo:'L-homeassistant',name:'Home Assist' },
  'home-assistant':        { logo:'L-homeassistant',name:'Home Assist' },
  'prometheus':            { logo:'L-prometheus',   name:'Prometheus' },
  'uptime-kuma':           { logo:'L-uptimekuma',   name:'Uptime Kuma' },
  'uptime_kuma':           { logo:'L-uptimekuma',   name:'Uptime Kuma' },
  'immich':                { logo:'L-immich',       name:'Immich' },
  'watchtower':            { logo:'L-watchtower',   name:'Watchtower' },
  'homarr':                { logo:'L-homarr',       name:'Homarr' },
  'node_exporter':         { logo:'L-nodeexporter', name:'Node Exp' },
  'node-exporter':         { logo:'L-nodeexporter', name:'Node Exp' },
  'vaultwarden':           { logo:'L-wireguard',    name:'Vaultwarden' },
  'nextcloud':             { logo:'L-nextcloud',    name:'Nextcloud' },
  'nextcloud-aio-mastercontainer': { logo:'L-nextcloud', name:'Nextcloud' },
  'redis':                 { logo:'L-redis',        name:'Redis' },
  'gitea':                 { logo:'L-gitea',        name:'Gitea' },
  'wireguard':             { logo:'L-wireguard',    name:'WireGuard' },
  'docker':                { logo:'L-docker',       name:'Docker' },
  'portainer':             { logo:'L-portainer',    name:'Portainer' },
  'claude-monitor':        { logo:'L-claude',       name:'Claude Mon' },
  'claude_monitor':        { logo:'L-claude',       name:'Claude Mon' },
};

function cInfo(raw) {
  if (!raw) return { logo:'L-homarr', name:'?' };
  // Exact match
  if (CMAP[raw]) return CMAP[raw];
  // Prefix match (handles immich_server, immich_ml, etc.)
  const lo = raw.toLowerCase();
  for (const [k, v] of Object.entries(CMAP)) {
    if (lo.startsWith(k.toLowerCase())) return v;
    if (lo.replace(/[-_]/g,'').startsWith(k.toLowerCase().replace(/[-_]/g,''))) return v;
  }
  const seg = raw.split(/[-_]/)[0];
  return { logo:'L-homarr', name: seg.charAt(0).toUpperCase() + seg.slice(1,12) };
}

// ═══ Container grouping: merge immich_* → single "Immich" tile ═══
function groupContainers(containers) {
  const groups = {};
  const order = [];

  for (const c of containers) {
    const { name } = cInfo(c.name);
    // Use the friendly name as the group key
    if (!groups[name]) {
      groups[name] = { ...c, _members: [c] };
      order.push(name);
    } else {
      groups[name]._members.push(c);
      // Worst-case status: unhealthy > exited > starting > healthy
      const rank = s => {
        const st = (s||'').toLowerCase();
        if (st.includes('unhealthy')) return 4;
        if (st.includes('exited') || st.includes('dead')) return 3;
        if (st.includes('starting')) return 2;
        if (st.startsWith('up')) return 1;
        return 5;
      };
      if (rank(c.status) > rank(groups[name].status)) {
        groups[name].status = c.status;
      }
    }
  }
  return order.map(k => groups[k]);
}

function cClass(status) {
  if (!status) return 'exited';
  const s = status.toLowerCase();
  if (s.includes('unhealthy')) return 'unhealthy';
  if (s.includes('starting') || s.includes('health: starting')) return 'starting';
  if (s.startsWith('up')) return 'healthy';
  return 'exited';
}
function sdotClass(cls) { return {healthy:'green',unhealthy:'red',starting:'yellow',exited:'gray'}[cls]||'gray'; }
function cStatus(status) {
  if (!status) return 'Stopped';
  const s = status.toLowerCase();
  if (s.includes('unhealthy')) return 'Unhealthy';
  if (s.includes('(healthy)')) { const m=status.match(/Up ([\w ]+)\(/); return m ? 'Up '+m[1].trim() : 'Healthy'; }
  if (s.startsWith('up')) { const m=status.match(/Up (.+)/i); return m ? 'Up '+m[1].split('(')[0].trim() : 'Running'; }
  if (s.includes('exited')) { const m=status.match(/Exited \((\d+)\)/i); return m ? 'Exited ('+m[1]+')' : 'Exited'; }
  return status.slice(0,20);
}

// ═══ Docker grid ═══
function updateDockerGrid(rawContainers) {
  const containers = groupContainers(rawContainers);
  const up = containers.filter(c => (c.status||'').toLowerCase().startsWith('up')).length;
  document.getElementById('d-count').textContent = up + ' / ' + containers.length + ' running';

  const sorted = [...containers].sort((a,b) => {
    const o = {healthy:0,starting:1,unhealthy:2,exited:3};
    return (o[cClass(a.status)]||3)-(o[cClass(b.status)]||3) || (a.name||'').localeCompare(b.name||'');
  });

  document.getElementById('docker-grid').innerHTML = sorted.map(c => {
    const cls = cClass(c.status);
    const { logo, name } = cInfo(c.name);
    const dot = sdotClass(cls);
    return `<div class="tile ${cls}">
      <svg class="tile-logo" viewBox="0 0 24 24"><use href="#${logo}"/></svg>
      <div class="tile-name">${name}</div>
      <div class="tile-bottom">
        <div class="sdot ${dot}"></div>
        <div class="tile-status">${cStatus(c.status)}</div>
      </div>
    </div>`;
  }).join('');
}

// ═══ Storage ═══
function pctNum(s) { return parseInt((s||'0').replace('%',''))||0; }
function barCls(pct, base) { return pct>85?'cr':pct>70?'co':base; }
// SVG icons replacing emoji (emoji render as boxes on Pi Chromium)
const ICO_SD  = `<svg class="stor-icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="8" y="2" width="2" height="4" rx="1"/><rect x="11" y="2" width="2" height="4" rx="1"/><rect x="14" y="2" width="2" height="4" rx="1"/></svg>`;
const ICO_SSD = `<svg class="stor-icon" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><rect x="5" y="10" width="6" height="4" rx="1"/><circle cx="17" cy="12" r="2"/></svg>`;
const ICO_HDD = `<svg class="stor-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17" cy="12" r="2.5"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="12" x2="11" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
function storBar(pct, base) {
  return `<div class="stor-bar"><div class="stor-fill ${barCls(pct,base)}" style="width:${pct}%"></div></div>`;
}
function renderStorage(sdcard, drives) {
  let h = '';
  const sdp = pctNum(sdcard.pct);
  h += `<div class="stor-item">
    <div class="stor-top">${ICO_SD}<span class="stor-name">SD Card</span><span class="stor-size">${sdcard.used||'?'} / ${sdcard.total||'?'}</span></div>
    <div class="stor-bottom"><span>/dev/mmcblk0</span><span class="stor-pct">${sdcard.pct||'?'}</span></div>
    ${storBar(sdp,'cb')}
  </div>`;

  const ssd = drives.find(d=>d.name==='sda');
  if (ssd && ssd.mounted) {
    const p=pctNum(ssd.pct);
    const sm=ssd.smart||{};
    const smartLine = sm.tempC!=null
      ? `${sm.tempC}°C · Wear ${sm.wearPct||0}% · Spare ${sm.spareAvail!=null?sm.spareAvail:'?'}%${sm.mediaErrors?` · ⚠ ${sm.mediaErrors} err`:''}`
      : '';
    h += `<div class="stor-item">
      <div class="stor-top">${ICO_SSD}<span class="stor-name">SSD</span><span class="stor-size">${ssd.used} / ${ssd.total}</span></div>
      <div class="stor-bottom"><span>${ssd.model||'T7'} · ${ssd.sizeGB}GB</span><span class="stor-pct">${ssd.pct}</span></div>
      ${smartLine?`<div style="font-size:10px;color:rgba(56,189,248,.55);margin-top:1px;padding-left:2px">${smartLine}</div>`:''}
      ${storBar(p,'cg')}
    </div>`;
  } else if (ssd) {
    h += `<div class="stor-item">
      <div class="stor-top">${ICO_SSD}<span class="stor-name">SSD</span><span class="stor-size stor-unmounted">unmounted</span></div>
      <div class="stor-bottom" style="color:rgba(255,255,255,.3)"><span>${ssd.model||'T7'} · ${ssd.sizeGB}GB</span><span>—</span></div>
      ${storBar(0,'cg')}
    </div>`;
  }

  const hddNames=['sdb','sdc','sdd','sde'], hddCols=['cp','cc','cy','co'];
  for (let i=0;i<4;i++) {
    const d=drives.find(dr=>dr.name===hddNames[i]);
    if (d && d.mounted) {
      const p=pctNum(d.pct);
      h += `<div class="stor-item">
        <div class="stor-top">${ICO_HDD}<span class="stor-name">HDD ${i+1}</span><span class="stor-size">${d.used} / ${d.total}</span></div>
        <div class="stor-bottom"><span>${d.model||d.name} · ${d.sizeGB} GB</span><span class="stor-pct">${d.pct}</span></div>
        ${storBar(p,hddCols[i])}
      </div>`;
    } else if (d) {
      h += `<div class="stor-item">
        <div class="stor-top">${ICO_HDD}<span class="stor-name">HDD ${i+1}</span><span class="stor-size stor-unmounted">unmounted</span></div>
        <div class="stor-bottom" style="color:rgba(255,255,255,.3)"><span>${d.model||d.name}</span><span>—</span></div>
        ${storBar(0,hddCols[i])}
      </div>`;
    }
  }
  document.getElementById('stor-list').innerHTML = h;
}

// ═══ Stats polling ═══
async function updateStats() {
  try {
    const d = await fetch('/api/stats').then(r=>r.json());

    const cpu = parseFloat(d.cpu)||0;
    setGauge('cpu', cpu, cpu>=90?'#ef4444':cpu>=70?'#f59e0b':'#3b82f6');
    document.getElementById('gv-cpu').textContent = cpu.toFixed(0)+'%';

    const rp = d.mem.total ? Math.round(d.mem.used/d.mem.total*100) : 0;
    setGauge('ram', rp, rp>=90?'#ef4444':rp>=75?'#f59e0b':'#22c55e');
    document.getElementById('gv-ram').textContent = rp+'%';

    const t = parseFloat(d.temp)||0;
    setGauge('temp', t, t>=75?'#ef4444':t>=60?'#f59e0b':'#22c55e');
    document.getElementById('gv-temp').textContent = t.toFixed(1)+'°';

    // HUD overlays
    document.getElementById('hud-cpu').textContent = cpu.toFixed(0)+'%';
    document.getElementById('hud-temp').textContent = t.toFixed(1)+'°C';

    renderStorage(d.sdcard||{}, d.drives||[]);

    const now = Date.now();
    if (prevRx !== null) {
      const dt = (now-prevT)/1000;
      const rx=fmtSpeed(Math.max(0,(d.network.rxBytes-prevRx)/dt));
      const tx=fmtSpeed(Math.max(0,(d.network.txBytes-prevTx)/dt));
      document.getElementById('rx-val').textContent=rx.v; document.getElementById('rx-unit').textContent=rx.u;
      document.getElementById('tx-val').textContent=tx.v; document.getElementById('tx-unit').textContent=tx.u;
    }
    prevRx=d.network.rxBytes; prevTx=d.network.txBytes; prevT=now;

    document.getElementById('uptime-val').textContent = d.uptime||'—';
    document.getElementById('ts-badge').textContent = d.tailscale?.active ? 'tailscale ✓' : 'tailscale';
    updateDockerGrid(d.containers||[]);

    // Pi-hole
    const ph = d.pihole;
    if (ph) {
      document.getElementById('ph-blocked').textContent = ph.blocked.toLocaleString();
      document.getElementById('ph-pct').textContent = ph.pctBlocked;
      document.getElementById('ph-total').textContent = ph.total.toLocaleString();
      document.getElementById('ph-cached').textContent = ph.cached.toLocaleString();
      document.getElementById('ph-domains').textContent = ph.domains.toLocaleString();
    }
  } catch(e) { console.error(e); }
}

function tick() {

  document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());

}

// ═══ RACK AI HUD ═══
let workingTimer = null;
const hudWrap = document.getElementById('hud-wrap');
const rackStatus = document.getElementById('rack-status');

function setWorking(on) {

    hudWrap.classList.add('hud-active');

    rackStatus.classList.add('working');
  } else {
    hudWrap.classList.remove('hud-active');

function triggerWorking() {

  clearTimeout(workingTimer);

// ═══ RACK AI Messages ═══
const MAX_FEED = 50;
let feed = [];

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtTs(ts) {
  if(!ts) return '';
  try { const d=new Date(ts); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  catch { return ''; }
}

function toNaturalMsg(ev) {
  const tool = (ev.tool||'');
  const preview = esc((ev.preview||'').slice(0,70));
  const type = (ev.type||'').toLowerCase();
  const t = tool.toLowerCase();
  if (type.includes('posttool')) {
    if (t.includes('bash'))    return preview ? `Command returned: ${preview}` : 'Command complete';
    if (t.includes('edit'))    return preview ? `Edited: ${preview}` : 'File edit applied';
    if (t.includes('write'))   return preview ? `Written: ${preview}` : 'File written';
    if (t.includes('read'))    return preview ? `Read: ${preview}` : 'File loaded';
    if (t.includes('grep'))    return `Search complete${preview ? ' — ' + preview : ''}`;
    if (t.includes('glob'))    return `Files located${preview ? ' — ' + preview : ''}`;
    if (t.includes('web'))     return `Web response received`;
    if (t.includes('agent'))   return `Sub-agent task complete`;
    return preview ? `Done — ${preview}` : `${tool} complete`;
  }
  if (type.includes('stop'))        return 'Session ended — standing by';
  if (type.includes('notification')) return preview ? `Notification: ${preview}` : 'System notification';
  // PreToolUse
  if (t.includes('bash'))    return preview ? `Running: ${preview}` : 'Executing command';
  if (t.includes('edit'))    return preview ? `Editing: ${preview}` : 'Editing file';
  if (t.includes('write'))   return preview ? `Writing: ${preview}` : 'Writing file';
  if (t.includes('read'))    return preview ? `Reading: ${preview}` : 'Reading file';
  if (t.includes('grep'))    return preview ? `Searching for: ${preview}` : 'Searching codebase';
  if (t.includes('glob'))    return preview ? `Scanning: ${preview}` : 'Scanning files';
  if (t.includes('websearch')) return preview ? `Web search: ${preview}` : 'Searching the web';
  if (t.includes('webfetch')) return preview ? `Fetching: ${preview}` : 'Fetching page';
  if (t.includes('agent'))   return preview ? `Launching agent: ${preview}` : 'Spawning sub-agent';
  if (t.includes('task'))    return preview ? `Task: ${preview}` : 'Managing task';
  return preview ? `${tool}: ${preview}` : tool || ev.type;
}

function renderMsgs() {
  const wrap = document.getElementById('msgs-wrap');
  if (!feed.length) {
    wrap.innerHTML = '<div class="rack-msg"><div class="rack-msg-who">RACK AI</div><div class="rack-msg-text" style="color:rgba(255,255,255,.25)">Awaiting activity…</div></div>';
    return;
  }
  const recent = [...feed].slice(-5).reverse();
  wrap.innerHTML = recent.map((ev, i) => {
    const msg = toNaturalMsg(ev);
    const time = fmtTs(ev.ts);
    return `<div class="rack-msg${i===0?' active':''}">
      <div class="rack-msg-who">RACK AI <span style="font-weight:400;opacity:.45">${time}</span></div>
      <div class="rack-msg-text">${msg}</div>
    </div>`;
  }).join('');
}

function addFeed(ev) {
  feed.push(ev);
  if (feed.length > MAX_FEED) feed.shift();
  if ((ev.type||'').toLowerCase().includes('pretool')) triggerWorking();
  renderMsgs();
}

// ═══ SSE ═══
function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('history', e => {
    try { feed = JSON.parse(e.data).slice(-MAX_FEED); renderMsgs(); } catch(_) {}
  });
  es.addEventListener('activity', e => {
    try { addFeed(JSON.parse(e.data)); } catch(_) {}
  });
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}


// === RackModule1 stats ===
const M1_CIRC = 2 * Math.PI * 34; // r=34 => 213.63
function setM1Gauge(id, pct, color) {
  const fill = Math.min(Math.max(pct,0),100) / 100 * M1_CIRC;
  const el = document.getElementById('m1gf-' + id);
  if (!el) return;
  el.setAttribute('stroke-dasharray', fill.toFixed(2) + ' ' + M1_CIRC.toFixed(2));
  el.setAttribute('stroke', color);
}

async function updateModule1Stats() {
  try {
    const d = await fetch('/api/module1-stats').then(r=>r.json());
    const dot = document.getElementById('m1-dot');
    const sub = document.getElementById('m1-sub');
    if (!d.online) {
      dot.className = 'm1-dot offline';
      sub.textContent = 'OFFLINE';
      ['cpu','ram','temp'].forEach(k => {
        const el = document.getElementById('m1-' + k); if(el) el.textContent = '—';
        setM1Gauge(k, 0, '#1e3a5f');
      });
      return;
    }
    dot.className = 'm1-dot online';
    sub.textContent = '192.168.1.110';

    const cpu = parseFloat(d.cpu)||0;
    document.getElementById('m1-cpu').textContent = cpu.toFixed(0)+'%';
    setM1Gauge('cpu', cpu, cpu>=90?'#ef4444':cpu>=70?'#f59e0b':'#3b82f6');

    const rp = d.mem && d.mem.total ? Math.round(d.mem.used/d.mem.total*100) : 0;
    document.getElementById('m1-ram').textContent = rp+'%';
    setM1Gauge('ram', rp, rp>=90?'#ef4444':rp>=75?'#f59e0b':'#22c55e');

    if (d.temp) {
      const t = parseFloat(d.temp)||0;
      document.getElementById('m1-temp').textContent = t.toFixed(0)+'°';
      setM1Gauge('temp', t/85*100, t>=75?'#ef4444':t>=60?'#f59e0b':'#22c55e');
    }

    if (d.disk && d.disk.pct !== null) {
      const dp = d.disk.pct;
      const sz = d.disk.usedGB && d.disk.totalGB ? d.disk.usedGB+'G / '+d.disk.totalGB+'G' : '';
      document.getElementById('m1-disk-size').textContent = sz;
      document.getElementById('m1-disk-pct').textContent = dp+'%';
      const fill = document.getElementById('m1-disk-fill');
      fill.style.width = dp+'%';
      fill.style.background = dp>=85?'#ef4444':dp>=70?'#f59e0b':'#a855f7';
    }
  } catch(e) {
    const dot = document.getElementById('m1-dot');
    if (dot) dot.className = 'm1-dot offline';
  }
}

// ═══ Boot ═══
tick(); setInterval(tick,1000);
updateStats(); setInterval(updateStats,3000);
updateModule1Stats(); setInterval(updateModule1Stats,5000);
connectSSE();
</script>
